name: CI

# Run only on pull requests targeting main.
# Push to main is omitted -- CI already ran on the PR before merge,
# so re-running on push is a duplicate that costs extra minutes.
on:
  pull_request:
    branches: ["main"]
    # Only run when source code or dependencies change.
    # Skips CI for docs, config, or workflow-only changes.
    paths:
      - "app/**"
      - "__tests__/**"
      - "*.ts"
      - "*.tsx"
      - "package-lock.json"

# Cancel any in-progress run for the same PR branch when a new commit is pushed.
# Prevents paying for stale runs that are no longer relevant.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest
    # Least-privilege: only read access to the repository contents is needed.
    permissions:
      contents: read
    steps:
      # Check out the repository so subsequent steps have access to the source.
      - name: Checkout code
        uses: actions/checkout@v4

      # Use the Node.js version defined in package.json's engines field.
      # Caching npm speeds up dependency installs on repeat runs.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      # Install exact versions from package-lock.json (no version drift).
      - name: Install dependencies
        run: npm ci

      # Run ESLint using eslint.config.ts (ESLint 9 flat config).
      # Fails the workflow if any linting errors are found.
      - name: Run ESLint
        run: npm run lint

      # Run all unit, component, and integration tests.
      # Fails the workflow if any test fails.
      - name: Run tests
        run: npm run test
